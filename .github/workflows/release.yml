name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Update cisv-core submodule to latest main
        run: git submodule update --init --remote --recursive
      - name: Validate tag and version sync
        run: |
          set -euo pipefail
          VERSION="$(cat VERSION)"
          EXT_VERSION="$(jq -r '.provide["ext-cisv"]' composer.json)"
          if [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            [ "$TAG_VERSION" = "$VERSION" ] || {
              echo "Tag/version mismatch: tag=$TAG_VERSION VERSION=$VERSION"
              exit 1
            }
          fi
          [ "$EXT_VERSION" = "$VERSION" ] || {
            echo "Composer/version mismatch: composer.ext-cisv=$EXT_VERSION VERSION=$VERSION"
            exit 1
          }
      - run: |
          sudo apt-get update
          sudo apt-get install -y php-cli php-dev php-pear build-essential
          make all
          make test

  publish-packagist:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Update cisv-core submodule to latest main
        run: git submodule update --init --remote --recursive
      - name: Validate Packagist secrets
        run: |
          if [ -z "${PACKAGIST_USERNAME:-}" ] || [ -z "${PACKAGIST_TOKEN:-}" ]; then
            echo "PACKAGIST_USERNAME and/or PACKAGIST_TOKEN secret missing"
            exit 1
          fi
        env:
          PACKAGIST_USERNAME: ${{ secrets.PACKAGIST_USERNAME }}
          PACKAGIST_TOKEN: ${{ secrets.PACKAGIST_TOKEN }}
      - name: Create/update package on Packagist
        run: |
          set -euo pipefail
          VERSION="$(cat VERSION)"
          PACKAGIST_JSON="$(curl -fsSL "https://repo.packagist.org/p2/sanix-darker/cisv.json")"
          if printf '%s' "${PACKAGIST_JSON}" | grep -q "\"version\":\"v${VERSION}\""; then
            echo "Packagist already indexes v${VERSION}; skipping API update trigger."
            exit 0
          fi
          PAYLOAD='{"repository":{"url":"https://github.com/Sanix-Darker/cisv-php"}}'
          for endpoint in create-package update-package; do
            CODE="$(curl -sS -o /tmp/packagist-${endpoint}.json -w "%{http_code}" -X POST \
              "https://packagist.org/api/${endpoint}?username=${PACKAGIST_USERNAME}&apiToken=${PACKAGIST_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "${PAYLOAD}" || true)"
            cat /tmp/packagist-${endpoint}.json
            echo
            if [ "${endpoint}" = "create-package" ] && [ "${CODE}" = "400" ]; then
              echo "Packagist create-package returned 400 (likely already exists), continuing."
              continue
            fi
            if [ "${CODE}" -lt 200 ] || [ "${CODE}" -ge 300 ]; then
              echo "Packagist ${endpoint} failed with HTTP ${CODE}"
              exit 1
            fi
          done
        env:
          PACKAGIST_USERNAME: ${{ secrets.PACKAGIST_USERNAME }}
          PACKAGIST_TOKEN: ${{ secrets.PACKAGIST_TOKEN }}

  release:
    needs: publish-packagist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Update cisv-core submodule to latest main
        run: git submodule update --init --remote --recursive
      - name: Resolve release tag
        id: rel
        run: echo "tag=v$(cat VERSION)" >> "$GITHUB_OUTPUT"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.rel.outputs.tag }}
          generate_release_notes: true
