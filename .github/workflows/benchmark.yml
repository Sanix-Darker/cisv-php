name: Benchmark PHP

on:
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build benchmark image
        run: docker build -t cisv-php-bench -f bindings/php/benchmarks/Dockerfile .
      - name: Run benchmark
        run: |
          set -euo pipefail
          docker run --rm --platform linux/amd64 --cpus=2 --memory=4g cisv-php-bench --rows=200000 --iterations=1 | tee bench.out
          grep -q "cisv-iterator" bench.out
