name: CI

on:
  push:
  pull_request:

jobs:
  version-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Update cisv-core submodule to latest main
        run: git submodule update --init --remote --recursive
      - name: Verify VERSION matches composer provide ext-cisv
        run: |
          set -euo pipefail
          VERSION="$(cat VERSION)"
          EXT_VERSION="$(jq -r '.provide["ext-cisv"]' composer.json)"
          [ "$VERSION" = "$EXT_VERSION" ] || {
            echo "Version mismatch: VERSION=$VERSION composer.ext-cisv=$EXT_VERSION"
            exit 1
          }

  php:
    runs-on: ubuntu-latest
    needs: version-sync
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Update cisv-core submodule to latest main
        run: git submodule update --init --remote --recursive
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y php-cli php-dev php-pear build-essential
      - name: Build and validate
        run: |
          make -C core/core all
          cd cisv
          phpize
          ./configure --enable-cisv
          make -j"$(nproc)"
          sudo make install
          php -d extension=cisv.so scripts/verify_api.php
